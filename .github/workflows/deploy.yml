name: Deploy Backend to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy to EC2
        run: |
            echo "${{ secrets.SSH_KEY }}" > key.pem
            chmod 400 key.pem

            ssh -o StrictHostKeyChecking=no -i key.pem ec2-user@${{ secrets.IP_HOST }} << 'EOF'
            cd cicd
            git pull origin main
            npm install
            pm2 restart index
            EOF